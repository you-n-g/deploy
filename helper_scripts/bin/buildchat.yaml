compare: |
  💻 You are a helpful AI assistant.

  👤
  Previously, you have a script like this:
  ```python
  {{ prev_code }}
  ```

  It's according running stdout is:
  ```
  {{ prev_stdout }}
  ```

  After improving the solution, you have a script like this:
  ```python
  {{ curr_code }}
  ```

  It's according running stdout is:
  ```
  {{ curr_stdout }}
  ```

  The prediction performance and related information are demonstrated in the stdout.
  I want to understand how the prediction performance are greatly improved.
  Please pay attention to the following points:
  - Is the prediction target changed?
  - Is the metric changed?

web:  | 
  💻 You are a helpful AI assistant.

  👤 
  You have a webpage with following content:
  ````markdown
  {{ markdown }}
  ````

  I want to discuss with you about the content of the webpage.
  Please response in Chinese.

pdf: |-
  💻 You are a helpful AI assistant.

  👤 
  You have a PDF with the following extracted text:
  ````text
  {{ text }}
  ````
  I want to discuss with you about the content of the webpage.
  Please response in Chinese.

pdf-option:
  paper: &paper-reading |-
    请总结这篇文章，主要内容包含以下部分
    1. 指明文章解决的问题和场景
    2. 只聚焦在 **方法设计** 本身的亮点（不讨论跨领域成果与应用表现），归纳文章亮点；总结时强调方法设计的逻辑链（即从要解决的问题、挑战，如何推导到当前方法的必要性）
    3. 验证方法的有效性，它选取了什么场景用于评测，每个场景试用的指标是什么意思？请用表格形式展示
    4. 和哪些Baseline做了比较，在方法设计上（而不是实验结果），现在的方法比baseline更好？

    每个关键点后都接一个[<原文内容>]的引用(如果有图表也要引用)，方便我Ctrl+F查找。
    回复格式请遵循markdown语法，便于使用markdown工具进行阅读。

paper-option:
  reading: *paper-reading
  review: |-
    你是一个NIPS/ICML/ICLR 顶尖会议的reviewer, 对于这篇paper，你会觉得有什么缺陷？
    对于你指明的每一处缺陷，请列出原文引用，方便后续去原文中查找&证实。
  review1: |-
    你是一个NIPS/ICML/ICLR 顶尖会议的reviewer, 对于这篇paper，
    是否有不自洽的地方，比如有的点逻辑链路不完整 (完整的逻辑链路应该是 提出问题-> 提出解决方案 -> 实验验证)
    同时引用原文内容，方便后续去原文中查找&证实。
  review2: |-
    你是一个NIPS/ICML/ICLR 顶尖会议的reviewer, 对于这篇paper，
    论文中是否有表达不清的问题，例如
    - 某些可能引起歧义的术语在首次出现时没有解释或给出参考文献
    - 某些用词在前后出现时不一致，从而造成理解困难


